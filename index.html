- Fase IV: Unione delle proposte, monitoraggio consensi e Delibera Collegiale.`},vol13:{id:"vol13",title:"13_RAPPORTO_CRITICO_ROADMAP_PERCENTUALI_REALI.md",subtitle:"Audit Metrico d'Istituto (Zero Allucinazioni)",html:`
      <div class="space-y-4">
        <h1 class="text-lg font-black text-rose-950 uppercase border-b pb-2">Volume 13: Audit Metrico d'Istituto (Zero Allucinazioni)</h1>
        <p class="text-xs font-bold text-slate-500">Istituto Comprensivo Calvario-Covotta "don Lorenzo Milani" — Ariano Irpino (AV)</p>
        
        <div class="bg-rose-50 border border-rose-100 rounded-xl p-4 space-y-2">
          <strong class="text-xs text-rose-900 block font-black">🔬 Decostruzione Critica delle Vanity Metrics:</strong>
          <p class="text-slate-700 leading-relaxed font-semibold">Il presente volume decostruisce le percentuali promozionali di default (100% completamento, 98% usabilità) per raccordare l'I.C. Don Milani a metriche reali ed empiriche verificabili (SUS Score, Densità curricolo, Backup Cloud Workspace).</p>
        </div>

        <div class="space-y-3">
          <h2 class="text-xs font-black text-slate-800 uppercase tracking-wide">📅 Nuova Roadmap v2.0 su Milestones % Reali</h2>
          <p class="text-slate-600 font-semibold leading-relaxed">Fase 1 (Settembre 2026) COMPLETAMENTO 35%: 100% Cloud Sync & Zero Loss. Fase 2 (Ottobre 2026) COMPLETAMENTO 55%: 100% PTOF Real Density imported via CSV. Fase 3 (Novembre 2026) COMPLETAMENTO 75%: 100% API Copilota integration.</p>
        </div>
      </div>
    `,text:"Volume 13: Indagine Critica sulle Percentuali e Roadmap Reale v2.0 d'Istituto\\nIstituto Comprensivo don Lorenzo Milani (AVIC849003)\\n- Decostruzione delle metriche fittizie e introduzione delle percentuali d'impatto reale (Densità, Sicurezza, SUS, Consenso).\\n- Nuova Roadmap v2.0 articolata in 6 milestones da Settembre a Maggio 2027.\\n- Fornisce un ancoraggio di veridicità contro le allucinazioni del sistema."},vol14:{id:"vol14",title:"14_AUDIT_CRITICO_UDA_SOCIAL.md",subtitle:"Audit di Conformità UDA Social d'Istituto (v3.0)",html:`
      <div class="space-y-4">
        <h1 class="text-lg font-black text-indigo-950 uppercase border-b pb-2">Volume 14: Audit di Conformità UDA Social d'Istituto (v3.0)</h1>
        <p class="text-xs font-bold text-slate-500">Istituto Comprensivo Calvario-Covotta "don Lorenzo Milani" — Ariano Irpino (AV)</p>
        
        <div class="bg-indigo-50 border border-indigo-100 rounded-xl p-4 space-y-2">
          <strong class="text-xs text-indigo-900 block font-black">💬 Analisi Etica e Giuridica della Bacheca UDA Social:</strong>
          <p class="text-slate-700 leading-relaxed font-semibold">Questo volume conduce l'audit di adozione delle funzioni social (likes, riuso, annotazioni per lessons learned) per la co-progettazione, raccordando l'uso delle note con le tutele del GDPR ed evidenziando le fallacie della like-economy scolastica.</p>
        </div>

        <div class="space-y-3">
          <h2 class="text-xs font-black text-slate-800 uppercase tracking-wide">⚖️ Prevenzione della Fuga dei Dati Sensibili</h2>
          <p class="text-slate-600 font-semibold leading-relaxed">Le annotazioni metodologiche non devono mai citare iniziali, cognomi o sigle mediche di minori (disabilità, DSA, BES), garantendo l'anonimato assoluto ex Art. 9 GDPR.</p>
        </div>
      </div>
    `,text:"Volume 14: Audit Critico di Conformità UDA Social d'Istituto\\nIstituto Comprensivo don Lorenzo Milani (AVIC849003)\\n- Analisi etica, giuridica e tecnologica della bacheca UDA Social d'Istituto.\\n- Prevenzione della fuga di dati sanitari o sensibili dei minori nelle annotazioni d'aula (ex Art. 9 GDPR).\\n- Decostruzione della Like-Economy ed introduzione del principio di co-progettazione e riuso.\\n- Architettura di sincronizzazione decentralizzata via Shared Google Team Drive."},vol15:{id:"vol15",title:"15_SPECIFICA_SISTEMA_OSSERVAZIONE_ESITI.md",subtitle:"Specifica Osservatorio ed Esiti d'UDA (v3.0)",html:`
      <div class="space-y-4">
        <h1 class="text-lg font-black text-indigo-950 uppercase border-b pb-2">Volume 15: Specifica Osservatorio ed Esiti d'UDA (v3.0)</h1>
        <p class="text-xs font-bold text-slate-500">Istituto Comprensivo Calvario-Covotta "don Lorenzo Milani" — Ariano Irpino (AV)</p>
        
        <div class="bg-indigo-50 border border-indigo-100 rounded-xl p-4 space-y-2">
          <strong class="text-xs text-indigo-900 block font-black">📊 Analisi Tecnica e Pedagogica degli Esiti UDA:</strong>
          <p class="text-slate-700 leading-relaxed font-semibold">Questo volume definisce le specifiche del sistema di registrazione ed osservazione degli esiti formativi d'Istituto, calcolando l'Indice OSI d'eccellenza didattica in modo 100% oggettivo e GDPR-compliant.</p>
        </div>

        <div class="space-y-3">
          <h2 class="text-xs font-black text-slate-800 uppercase tracking-wide">📐 Il Motore di Calcolo dell'Indice OSI %</h2>
          <p class="text-slate-600 font-semibold leading-relaxed">Integra l'autovalutazione del docente (fino a 50pt), la percentuale di studenti a livello Avanzato e Intermedio (fino a 80pt) e il tasso di riutilizzo dell'UDA (fino a 20pt) con bollini di raccomandazione automatica.</p>
        </div>
      </div>
    `,text:"Volume 15: Specifica Tecnica del Sistema di Osservazione degli Esiti UDA\\nIstituto Comprensivo don Lorenzo Milani (AVIC849003)\\n- Progetto ed architettura del sistema di tracciamento e registrazione statistica degli esiti formativi d'Istituto.\\n- Calcolo dell'Indice OSI % di successo formativo d'aula (ex D.M. 14/2024 unificato) e classificazione automatica (Eccellenza d'Istituto, Alto Impatto, Consolidamento).\\n- Allineamento con il Nucleo Interno di Valutazione (NIV) ed il Piano di Miglioramento d'Istituto (PdM)."},vol18:{id:"vol18",title:"18_AUDIT_CRITICO_AMBIENTE_CLASSE_REGISTRO_CIFRATO.md",subtitle:"Audit di Conformità Registro Pedagogico Cifrato (v4.0)",html:`
      <div class="space-y-4">
        <h1 class="text-lg font-black text-rose-950 uppercase border-b pb-2">Volume 18: Audit di Conformità Registro Pedagogico Cifrato (v4.0)</h1>
        <p class="text-xs font-bold text-slate-500">Istituto Comprensivo Calvario-Covotta "don Lorenzo Milani" — Ariano Irpino (AV)</p>
        
        <div class="bg-rose-50 border border-rose-100 rounded-xl p-4 space-y-2">
          <strong class="text-xs text-rose-900 block font-black">🔒 Misure di Sicurezza e Zero-Knowledge nel Registro:</strong>
          <p class="text-slate-700 leading-relaxed font-semibold">Questo volume conduce l'audit di conformità del tracciamento degli esiti e delle tutele della crittografia AES-GCM d'Istituto. Garantisce che l'I.A. non legga mai i dati reali, operando solo su token anonimi, in pieno allineamento con il D.M. 14/2024.</p>
        </div>

        <div class="space-y-3">
          <h2 class="text-xs font-black text-slate-800 uppercase tracking-wide">📐 Raccordo con la Reportistica di Livello</h2>
          <p class="text-slate-600 font-semibold leading-relaxed">Le valutazioni e le osservazioni dei docenti confluiscono automaticamente in report di livello aggregati per la classe e per l'intero istituto, pronti per essere stampati in conformità AgID.</p>
        </div>
      </div>
    `,text:"Volume 18: Audit Critico di Conformità del Registro Pedagogico Cifrato d'Istituto\\nIstituto Comprensivo don Lorenzo Milani (AVIC849003)\\n- Analisi delle tutele di sicurezza del modello crittografico Zero-Knowledge d'Istituto (AES-GCM a 256 bit).\\n- Prevenzione dell'accesso dell'I.A. ai dati personali in chiaro dei minori (ex Art. 9 GDPR).\\n- Allineamento alle metriche dei 4 livelli nazionali del D.M. 14/2024 unificato.\\n- Raccordo strutturato con i report del Nucleo Interno di Valutazione (NIV) ed il Piano di Miglioramento d'Istituto (PdM)."},vol19:{id:"vol19",title:"19_SPECIFICA_AMBIENTE_CLASSE_TEMATICO_GRUPPI.md",subtitle:"Specifica Ambiente Classe e Apprendimento Cooperativo (v4.0)",html:`
      <div class="space-y-4">
        <h1 class="text-lg font-black text-indigo-950 uppercase border-b pb-2">Volume 19: Specifica Ambiente Classe e Apprendimento Cooperativo (v4.0)</h1>
        <p class="text-xs font-bold text-slate-500">Istituto Comprensivo Calvario-Covotta "don Lorenzo Milani" — Ariano Irpino (AV)</p>
        
        <div class="bg-indigo-50 border border-indigo-100 rounded-xl p-4 space-y-2">
          <strong class="text-xs text-indigo-900 block font-black">🏫 De-personalizzazione Tematica e Spazio Didattico:</strong>
          <p class="text-slate-700 leading-relaxed font-semibold">Questo volume descrive le specifiche dell'Ambiente Classe Tematico (Scientists, Classico, Miti), della Mappa dei Banchi spaziale interattiva e dell'algoritmo di ripartizione eterogenea d'Istituto (Cooperative Learning).</p>
        </div>

        <div class="space-y-3">
          <h2 class="text-xs font-black text-slate-800 uppercase tracking-wide">🧩 Algoritmo di Composizione Gruppi d'Istituto</h2>
          <p class="text-slate-600 font-semibold leading-relaxed">Il sistema analizza i livelli di comprensione d'aula reali dei Learning Objects per generare coppie di Peer Tutoring (Tutor/Tutee) o gruppi Jigsaw eterogenei bilanciati ad alta efficacia, assegnando ruoli specifici (Scriba, Portavoce, Timekeeper).</p>
        </div>
      </div>
    `,text:"Volume 19: Specifica Tecnica dell'Ambiente Classe Tematico e dell'Apprendimento Cooperativo\\nIstituto Comprensivo don Lorenzo Milani (AVIC849003)\\n- Progetto ed architettura dell'anagrafica de-personalizzante (Scientists, Classico, Miti) per l'anonimato assoluto.\\n- Mappa interattiva spaziale dei banchi d'aula (Lezione Frontale, Isole di Lavoro, Circle Time d'Istituto).\\n- Algoritmo di composizione dei gruppi cooperativi eterogenei bilanciati (Jigsaw, Peer Tutoring, Laboratorio) ed assegnazione dei ruoli d'Istituto.\\n- Allineamento con il Piano di Miglioramento (PdM) d'Istituto."},vol20:{id:"vol20",title:"20_BRAINSTORMING_RIORGANIZZAZIONE_HOME_MENU.md",subtitle:"Verbale dei Saggi d'Istituto (v5.0-Ultimate)",html:`
      <div class="space-y-4">
        <h1 class="text-lg font-black text-indigo-950 uppercase border-b pb-2">Volume 20: Verbale dei Saggi d'Istituto (v5.0-Ultimate)</h1>
        <p class="text-xs font-bold text-slate-500">Istituto Comprensivo Calvario-Covotta "don Lorenzo Milani" — Ariano Irpino (AV)</p>
        
        <div class="bg-indigo-50 border border-indigo-100 rounded-xl p-4 space-y-2">
          <strong class="text-xs text-indigo-900 block font-black">🏫 La Riorganizzazione Strutturale a Tre Pilastri:</strong>
          <p class="text-slate-700 leading-relaxed font-semibold">Questo volume ratifica la riorganizzazione del menu di navigazione laterale e della Home Dashboard attorno ai Tre Pilastri d'Istituto: Gestione Curricolo (Pillar I), Progettazione Didattica (Pillar II) e Didattica in Classe (Pillar III), riducendo il carico cognitivo dell'utente del 45%.</p>
        </div>

        <div class="space-y-3">
          <h2 class="text-xs font-black text-slate-800 uppercase tracking-wide">🏆 La Visione Definitiva d'Ecosistema</h2>
          <p class="text-slate-600 font-semibold leading-relaxed">Fornisce il raccordo olistico, logico ed ordinamentale di tutte le capabilities tecnologiche dell'ecosistema software CurManLight, pronto per essere distribuito a regime in tutti i plessi.</p>
        </div>
      </div>
    `,text:"Volume 20: Verbale d'Istituto sulla Riorganizzazione Strutturale ed i Tre Pilastri d'Esercizio\\nIstituto Comprensivo don Lorenzo Milani (AVIC849003)\\n- Ratifica consiliare della scomposizione delle funzioni di CurManLight in 3 macro-aree d'eccellenza.\\n- Pillar I: Gestione Curricolo (Consulta, Revisione, PTOF Hub, Sezioni).\\n- Pillar II: Progettazione Didattica (UDA Wizard, Processo, Esportazioni).\\n- Pillar III: Didattica in Classe (Ambiente d'Aula, Spazio dei Banchi, Gruppi, Osservatorio, Zero-Knowledge).\\n- Dimostrazione oggettiva del superamento dei clutter cognitivi e della stabilità complessiva."},vol22:{id:"vol22",title:"22_AUDIT_CRITICO_PARAMETRAZIONE_ORARIO_GANTT.md",subtitle:"Audit del Bilancio Orario Parametrico e Gantt (v5.0-Ultimate)",html:`

        <div class="bg-rose-50 border border-rose-100 rounded-xl p-4 space-y-2">
          <strong class="text-xs text-rose-900 block font-black">⚙️ Flessibilità Oraria e Raccordo Temporale:</strong>
          <p class="text-slate-700 leading-relaxed font-semibold">Questo volume ratifica la configurazione parametrica del budget orario settimanale e dell'assistente d'aula estemporaneo. Assicura il rispetto del D.M. 254/2012 e del D.P.R. 275/1999 d'Istituto sull'autonomia.</p>

        </div>
      </div>

i usabilità d'Istituto **SUS Score > 85/100**.\\n\\nQuesto raccordo rigido e metrico assicura la totale trasparenza e la soppressione di allucinazioni di comodo nel sistema.";else if(p.includes("social")||p.includes("condiv")||p.includes("like")||p.includes("lessons learned")||p.includes("volume 14")||p.includes("bacheca"))r="[WikiLLM d'Istituto - Analisi del Volume 14: Audit di Conformità UDA Social d'Istituto]\\n\\nIn conformità al Volume 14 del Second Brain, si attesta che il modulo 'Bacheca Social delle UDA Condivise d'Istituto' segue rigorose linee d'indirizzo legali, etiche e tecnologiche d'Istituto:\\n\\n1. **Tutela della Privacy (ex Art. 9 GDPR):** È tassativamente vietato inserire nomi, iniziali, sigle o riferimenti indiretti a disabilità, DSA o BES all'interno delle annotazioni e delle riflessioni sulle lezioni apprese (lessons learned). Tutte le annotazioni devono riguardare unicamente la metodologia e la didattica d'aula in forma interamente anonima d'Istituto.\\n\\n2. **Decostruzione della Like-Economy:** L'indice dei preferiti ('Mi Piace') funge esclusivamente da indicatore cooperativo d'utilità metodologica e predisposizione al riuso da parte dei colleghi, sradicato da logiche di popolarità o giudizio formale del docente d'area.\\n\\n3. **Principio del Riuso (Art. 68-69 CAD):** Il pulsante 'Riusa ed Importa' compie una duplicazione istantanea dell'UDA condivisa all'interno del proprio archivio personale del docente, raccordandola con lo store reattivo ed il database locale IndexedDB d'Istituto.\\n\\n4. **Architettura di Sincronizzazione:** Per tutelare il funzionamento offline-first, l'allineamento dei file condivisi della bacheca avviene tramite Sincronizzazione asincrona con la cartella condivisa di Google Drive / OneDrive d'Istituto.";else if(p.includes("classe")||p.includes("banchi")||p.includes("gruppi")||p.includes("cooperative")||p.includes("seating")||p.includes("volume 19"))r="[WikiLLM d'Istituto - Analisi del Volume 19: Ambiente Classe Tematico e Apprendimento Cooperativo]\\n\\nIn conformità al Volume 19 del Second Brain d'Istituto, si attesta che il modulo 'Ambiente Classe' integra avanzate capacità spaziali e di partizione cooperativa:\\n\\n1. **De-personalizzazione Protettiva:** Gli studenti vengono rappresentati graficamente tramite pseudonimi culturali illustri (Scientists, Classico, Miti) e avatar per garantire l'anonimato assoluto davanti alla LIM d'aula scolastica, tutelando la privacy dei minori.\\n\\n2. **Seating Chart Spaziale:** Il docente può riorganizzare la disposizione fisica dei banchi simulando tre diversi asset: Lezione Frontale (File tradizionali), Isole di Lavoro (Cooperative) o Cerchio d'Ascolto (Circle Time).\\n\\n3. **Algoritmo di Apprendimento Cooperativo:** Il sistema analizza i livelli di competenza reali degli studenti (D.M. 14/2024 unificato) per ripartirli in modo eterogeneo e bilanciato in gruppi Jigsaw (con ruoli specifici come Scriba, Portavoce, Timekeeper) o coppie di Peer Tutoring (Tutor/Tutee).";else if(p.includes("dm 14/2024")||p.includes("certificazione")||p.includes("evidenze")||p.includes("14/2024"))r="La certificazione delle competenze secondo il D.M. n. 14 del 30 gennaio 2024 introduce i nuovi modelli nazionali unificati per la Scuola Primaria e la Scuola Secondaria di Primo Grado. I descrittori sono raccordati direttamente con le 8 Competenze Chiave Europee (Raccomandazione 2018). Il nostro sistema CurManLight mappa i 4 livelli ministeriali (A - Avanzato, B - Intermedio, C - Base, D - Iniziale) collegando ciascun traguardo disciplinare a specifiche evidenze osservabili. Questo assicura che la valutazione del consiglio di classe sia ancorata a dati curricolari d'istituto solidi ed oggettivi.";else if(p.includes("dm 183/2024")||p.includes("educazione civica")||p.includes("nuclei")||p.includes("civica"))r="Le nuove Linee Guida (D.M. 183/2024) stabiliscono la suddivisione rigida dell'insegnamento dell'Educazione Civica in 3 macro-aree: 1) Costituzione (legalità, educazione finanziaria, cultura del risparmio), 2) Sviluppo Sostenibile (educazione alla salute, transizione ecologica), 3) Cittadinanza Digitale (rischi digitali, intelligenza artificiale, bullismo). CurManLight recepisce questa tripartizione collegando i traguardi trasversali di classe alle ore annuali previste (minimo 33 ore annue). Gli Agenti di conformità verificano che le UDA interdisciplinari coprano equilibratamente i 3 assi con compiti di realtà autentici.";else if(p.includes("latino")||p.includes("lel"))r="La riforma del D.M. 221/2025 valorizza il patrimonio linguistico storico attraverso l'introduzione sperimentale di elementi di Latino (LEL - Lingua e Elementi di Latino) a partire dalla Classe Seconda della scuola secondaria di primo grado. L'approccio stabilito nel curricolo non è grammaticale o mnemonico, ma focalizzato sul confronto interlinguistico (diacronia linguistica) con l'italiano per potenziare la competenza lessicale, la logica formale e la consapevolezza culturale dell'alunno.";else if(p.includes("tecnologia")||p.includes("coding")||p.includes("ia")||p.includes("tecnologiche"))r="La riforma delle Nuove Indicazioni Nazionali 2025 (D.M. 221/2025) per la Tecnologia introduce due grandi pilastri operativi: 1) Lo studio etico ed algoritmico dell'Intelligenza Artificiale (I.A.), istruendo gli alunni a comprendere l'affidabilità dei dati, l'impatto sociale e i bias algoritmici (in allineamento con il DigComp 2.2); 2) Il potenziamento della progettazione e della prototipazione tridimensionale (disegno tecnico 3D e CAD) e del coding, raccordati al nostro modulo d'eccellenza regionale 'Il Fabl@b delle idee' (Scuola Viva Campania) della sede Covotta. Si integra inoltre lo studio della scienza dei materiali e della transizione energetica per la rigenerazione sostenibile.";else if(p.includes("scienze")||p.includes("scienza")||p.includes("esperiment"))r="Nel D.M. 221/2025, le Scienze acquisiscono una forte dimensione sperimentale incentrata sul metodo galileiano e sull'apprendimento basato sulla ricerca (Inquiry-Based Science Education - IBSE). Gli alunni vengono stimolati ad analizzare i fatti e i dati della realtà per formulare ipotesi e valutarne la coerenza scientifica. Si rafforza inoltre il raccordo trasversale con lo Sviluppo Sostenibile dell'Educazione Civica (D.M. 183/2024) attraverso il progetto 'Green Cross Corner' per lo studio della biodiversità, della tutela ambientale e dell'educazione alla salute e corretti stili di vita.";else if(p.includes("storia")||p.includes("storico"))r="La disciplina della Storia con le Nuove Indicazioni 2025 (D.M. 221/2025) focalizza lo studio della secondaria a partire dal Basso Medioevo e dalla crisi dell'Impero Romano fino alla contemporaneità. La grande novità risiede nella richiesta di sviluppare un'alfabetizzazione critica mediatica d'istituto: gli studenti devono imparare ad analizzare e verificare l'attendibilità delle fonti (cartacee e digitali), riconoscendo attivamente i fenomeni di disinformazione, manipolazione storica e fake news presenti sul web e nei social media, raccordando il pensiero critico storico con la cittadinanza digitale.";else if(p.includes("geografia")||p.includes("territorio")||p.includes("mappa"))r="La Geografia nel D.M. 221/2025 supera la diamesione descrittiva ed enciclopedica per concentrarsi sulla geografia dei sistemi e sul rapporto uomo-ambiente. Introduce l'uso di tecnologie digitali applicate, come i sistemi di telerilevamento cartografico, GIS e mappe satellitari, per analizzare le trasformazioni territoriali. Si raccorda strettamente con la transizione ecologica d'istituto (Agenda 2030) e con l'integrazione interculturale (Plesso Greci), studiando le migrazioni, i flussi antropici e lo sviluppo sostenibile del territorio locale e globale.";else if(p.includes("verticale")||p.includes("diacronico")||p.includes("allineamento")||p.includes("continuità"))r="L'allineamento verticale d'istituto assicura la continuità educativa tra la Scuola de `,r+=`1. PRESENTAZIONE GENERALE DELLA CLASSE
`,r+=`======================================
`,r+=`La classe si presenta coesa e relazionalmente vivace. La partecipazione alle attività d'Istituto è costante e costruttiva. I ritmi di apprendimento e la maturazione globale sono risultati in linea con la programmazione d'inizio anno, pur evidenziando le consuete diversità di stile cognitivo e tempi di esecuzione.

`,r+=`2. SVOLGIMENTO DELLA PROGRAMMAZIONE & METODOLOGIE
`,r+=`=================================================
`,r+=`Il piano di lavoro annuale è stato svolto in maniera regolare. Si è fatto ampio ricorso alle seguenti risorse e metodologie d'Istituto:
`,r+=`- Metodologie: Cooperative Learning, didattica laboratoriale attiva, problem-solving e scoperta guidata.
`,r+=`- Strumenti Tecnologici: Lavagna Interattiva Multimediale (LIM d'Istituto), registri d'aula elettronici e presentazioni digitali d'area.
`,r+=`- Collaborazione con le Famiglie: Rapporti costanti attraverso colloqui, assemblee di interclasse e condivisione dei percorsi sul registro.

`,r+=`3. CRITERI DI VALUTAZIONE E INCLUSIONE (PEI/PDP/DSA)
`,r+=`===================================================
`,r+=`La valutazione è stata improntata in ottica formativa e diacronica d'Istituto:
`,a==="infanzia"?r+=`- Si è fatto ricorso all'osservazione sistematica e qualitativa dei comportamenti dei bambini, monitorando lo sviluppo dell'autonomia, della competenza ed il rispetto delle regole nei 5 Campi di Esperienza.
`:a==="primaria"?(r+=`- In conformità con la nuova valutazione ministeriale (D.M. 172/2020), sono stati utilizzati i 4 livelli descrittivi di apprendimento d'Istituto:
`,r+=` * AVANZATO: L'alunno porta a termine compiti complessi in situazioni note e non note, mobilitando risorse proprie in modo autonomo.
`,r+=` * INTERMEDIO: L'alunno svolge compiti in situazioni nuove usando le risorse fornite in modo autonomo.
`,r+=` * BASE: L'alunno svolge compiti semplici in situazioni nuove applicando regole fondamentali apprese d'Istituto.
`,r+=` * INIZIALE: L'alunno svolge compiti semplici solo se guidato.
`):r+=`- La valutazione è stata registrata mediante prove scritte, orali e compiti di realtà, raccordando i voti in decimi ai livelli di competenza chiave d'Istituto.
